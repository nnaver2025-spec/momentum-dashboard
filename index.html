<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Druckenmiller Momentum Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(45, 212, 191, 0.05) 0%, transparent 40%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .last-updated {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Macro Section */
        .macro-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .macro-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .macro-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .macro-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-gradient);
        }

        .macro-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .macro-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Table Section */
        section h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        section h2::before {
            content: '📈';
            font-size: 1.2rem;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1.25rem 1.5rem;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 1rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .ticker {
            font-weight: 700;
            color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
            padding: 0.25rem 0.6rem;
            border-radius: 0.5rem;
        }

        .return-positive {
            color: var(--success-color);
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            h1 { font-size: 2rem; }
            .macro-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Druckenmiller Momentum</h1>
            <p class="last-updated" id="last-updated">데이터 불러오는 중...</p>
        </header>

        <div class="macro-container">
            <div class="macro-card">
                <span class="macro-label">US 10Y Treasury</span>
                <div class="macro-value" id="us10y">--</div>
            </div>
            <div class="macro-card">
                <span class="macro-label">DXY Dollar Index</span>
                <div class="macro-value" id="dxy">--</div>
            </div>
        </div>

        <section>
            <h2>Top Momentum Stocks (3M Return Leaders)</h2>
            <div class="table-responsive">
                <table id="momentum-table">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Price</th>
                            <th>MA 50</th>
                            <th>MA 200</th>
                            <th>3M Return (%)</th>
                        </tr>
                    </thead>
                    <tbody id="momentum-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('데이터 파일을 찾을 수 없습니다.');
                const data = await response.json();

                // Update Macro
                document.getElementById('us10y').textContent = data.macro_indicators.US10Y + '%';
                document.getElementById('dxy').textContent = data.macro_indicators.DXY;
                document.getElementById('last-updated').textContent = 'Last Updated: ' + data.last_updated;

                // Update Table
                const tbody = document.getElementById('momentum-body');
                tbody.innerHTML = '';

                data.top_momentum_stocks.forEach(stock => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span class="ticker">${stock.ticker}</span></td>
                        <td>$${stock.price}</td>
                        <td>$${stock.ma50}</td>
                        <td>$${stock.ma200}</td>
                        <td class="return-positive">+${stock.return_3mo_pct}%</td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('last-updated').textContent = '데이터를 불러오는 데 실패했습니다 (data.json 확인 필요)';
                const tbody = document.getElementById('momentum-body');
                tbody.innerHTML = '<tr><td colspan="5" class="loading">데이터 로드 실패: scraper.py를 실행하거나 data.json 파일이 있는지 확인하세요.</td></tr>';
            }
        }

        fetchData();
    </script>
</body>
</html>
